name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up VM
        run: .ContinuousIntegrationScripts/installVm.sh

      - name: Apply core updates to image
        run: .ContinuousIntegrationScripts/installUpdates.sh

      - name: Run test suite
        run: .ContinuousIntegrationScripts/runTests.sh
