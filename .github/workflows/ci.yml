name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the VM layer first and cache it by itself.
      # Subsequent runs skip this if CuisVM.app/ hasn't changed.
      - name: Build VM layer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.vm
          push: false
          load: true
          tags: cuis-vm:ci
          cache-from: type=gha,scope=cuis-vm
          cache-to:   type=gha,scope=cuis-vm,mode=max

      # Build the image layer on top of the VM layer just loaded above.
      # Both layers are local to this runner — no registry needed.
      - name: Build image layer (applies all core updates)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.image
          push: false
          load: true
          tags: cuis-image:ci
          build-args: VM_IMAGE=cuis-vm:ci
          cache-from: type=gha,scope=cuis-image
          cache-to:   type=gha,scope=cuis-image,mode=max

      - name: Run test suite
        run: |
          docker run --rm \
            -v "$PWD/.github/scripts":/workspace/.github/scripts \
            -v "$PWD/Packages":/workspace/Packages \
            cuis-image:ci \
            bash .github/scripts/run-tests.sh
