name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Build the stable VM layer and cache it via buildx GHA cache.
      # On cache hit the actual build is skipped; the image is exported
      # to the local Docker daemon so the next step can use it.
      - name: Build VM layer
        run: |
          docker build \
            --file docker/Dockerfile.vm \
            --tag cuis-vm:ci \
            .

      # Build the image layer on top of the VM layer.
      # Applies all pending CoreUpdates to the Smalltalk image.
      - name: Build image layer (applies all core updates)
        run: |
          docker build \
            --file docker/Dockerfile.image \
            --build-arg VM_IMAGE=cuis-vm:ci \
            --tag cuis-image:ci \
            .

      - name: Run test suite
        run: |
          docker run --rm \
            -v "$PWD/.github/scripts":/workspace/.github/scripts \
            -v "$PWD/Packages":/workspace/Packages \
            cuis-image:ci \
            bash .github/scripts/run-tests.sh
