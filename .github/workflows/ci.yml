name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  # Opt into Node.js 24 for JavaScript actions ahead of the runner default
  # switch (June 2026). Helps catch incompatibilities early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── amd64: Docker pipeline ────────────────────────────────────────────────
  # Runs the full pipeline inside Docker for reproducibility.
  test-amd64:
    name: Tests (linux/amd64, Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build workspace image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file docker/Dockerfile \
            --target workspace \
            --load \
            --tag cuis-workspace:ci \
            .

      # Updates + tests run in one container so tests see the updated image.
      - name: Apply core updates + run tests
        run: |
          docker run --rm \
            --privileged \
            cuis-workspace:ci \
            bash -c "
              set -euo pipefail

              IMAGE_FILE=\$(ls CuisImage/ | grep -E 'Cuis[0-9]+\.[0-9]+-[0-9]+\.image' | head -1)
              [[ -z \"\$IMAGE_FILE\" ]] && { echo 'ERROR: no .image found in CuisImage/' >&2; exit 1; }

              INSTALL_UPDATES_SCRIPT=\"\\
                Utilities classPool at: #AuthorName put: 'GitHubActions'.
                Utilities classPool at: #AuthorInitials put: 'GHA'.
                ChangeSet installNewUpdates.
                Smalltalk saveAndQuit.\\
              \"

              \"\$CUIS_VM\" \$CUIS_VM_ARGS CuisImage/\"\$IMAGE_FILE\" -d \"\$INSTALL_UPDATES_SCRIPT\"

              \"\$CUIS_VM\" \$CUIS_VM_ARGS CuisImage/\"\$IMAGE_FILE\" -s .github/scripts/run-tests.st
            "

  # ── arm64: bare-metal pipeline ────────────────────────────────────────────
  # The ubuntu-24.04-arm runner cannot run the Squeak JIT inside Docker
  # (mprotect restrictions). We run directly on the runner instead.
  test-arm64:
    name: Tests (linux/arm64, bare-metal)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up VM
        run: |
          set -euo pipefail

          echo "Setting up VM for $RUNNER_OS ($(uname -m))"

          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)
              CUIS_VM_PATH=CuisVM.app/Contents/Linux-x86_64/squeak
              ;;
            aarch64|arm64)
              CUIS_VM_PATH=CuisVM.app/Contents/Linux-arm64/squeak
              # The squeak wrapper script uses ldd to detect the libc path.
              # On Ubuntu 24.04 ARM64 the ldd output format differs from what
              # the script expects. We export PLATFORMLIBDIR to skip ldd detection.
              echo "PLATFORMLIBDIR=/lib/aarch64-linux-gnu" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported Linux architecture: $ARCH" >&2
              exit 1
              ;;
          esac

          CUIS_VM_ARGUMENTS="-vm-sound-null -vm-display-null"
          chmod +x "$CUIS_VM_PATH"
          "$CUIS_VM_PATH" --version

          echo "CUIS_VM_PATH=$CUIS_VM_PATH" >> "$GITHUB_ENV"
          echo "CUIS_VM_ARGUMENTS=$CUIS_VM_ARGUMENTS" >> "$GITHUB_ENV"

      - name: Apply core updates
        run: |
          set -euo pipefail

          IMAGE_FILE=$(ls CuisImage/ | grep -E 'Cuis[0-9]+\.[0-9]+-[0-9]+\.image' | head -1)
          [[ -z "$IMAGE_FILE" ]] && { echo 'ERROR: no .image found in CuisImage/' >&2; exit 1; }

          INSTALL_UPDATES_SCRIPT="\
            Utilities classPool at: #AuthorName put: 'GitHubActions'.
            Utilities classPool at: #AuthorInitials put: 'GHA'.
            ChangeSet installNewUpdates.\
            Smalltalk saveAndQuit.\
          "

          # $CUIS_VM_ARGUMENTS must not be quoted so each flag is a separate arg.
          "$CUIS_VM_PATH" $CUIS_VM_ARGUMENTS "CuisImage/$IMAGE_FILE" -d "$INSTALL_UPDATES_SCRIPT"

      - name: Run test suite
        run: |
          set -euo pipefail

          IMAGE_FILE=$(ls CuisImage/ | grep -E 'Cuis[0-9]+\.[0-9]+-[0-9]+\.image' | head -1)
          [[ -z "$IMAGE_FILE" ]] && { echo 'ERROR: no .image found in CuisImage/' >&2; exit 1; }

          "$CUIS_VM_PATH" $CUIS_VM_ARGUMENTS "CuisImage/$IMAGE_FILE" -s .github/scripts/run-tests.st
