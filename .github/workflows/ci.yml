name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  # Opt into Node.js 24 for JavaScript actions ahead of the runner default
  # switch (June 2026). Helps catch incompatibilities early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── amd64: Docker pipeline ────────────────────────────────────────────────
  # Runs the full pipeline inside Docker for reproducibility.
  test-amd64:
    name: Tests (linux/amd64, Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build workspace image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file docker/Dockerfile \
            --target workspace \
            --load \
            --tag cuis-workspace:ci \
            .

      # Updates + tests run in one container so tests see the updated image.
      - name: Apply core updates + run tests
        run: |
          docker run --rm \
            --privileged \
            cuis-workspace:ci \
            bash -c "
              .github/scripts/install-updates.sh &&
              .github/scripts/run-tests.sh
            "

  # ── arm64: bare-metal pipeline ────────────────────────────────────────────
  # The ubuntu-24.04-arm runner cannot run the Squeak JIT inside Docker
  # (mprotect restrictions). We run directly on the runner instead.
  test-arm64:
    name: Tests (linux/arm64, bare-metal)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up VM
        run: .github/scripts/install-vm.sh

      - name: Apply core updates
        run: .github/scripts/install-updates.sh

      - name: Run test suite
        run: .github/scripts/run-tests.sh
