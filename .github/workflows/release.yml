name: Release

on:
  push:
    tags:
      - 'v*'

env:
  # Opt into Node.js 24 for JavaScript actions ahead of the runner default
  # switch (June 2026). Helps catch incompatibilities early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Build runtime image per arch (updates + tests + minimal image) ─────
  build-runtime:
    name: Build runtime (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build workspace image
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file docker/Dockerfile \
            --target workspace \
            --load \
            --tag cuis-workspace:${{ matrix.arch }} \
            .

      # Test an updated copy with BaseImageTests. If that passes, build a
      # separate clean image with updates only for release packaging.
      # --privileged: Squeak JIT requires mprotect(PROT_READ|PROT_EXEC).
      - name: Test updated image, then build clean release image
        run: |
          CID=$(docker create \
            --privileged \
            cuis-workspace:${{ matrix.arch }} \
            bash -c "
              set -euo pipefail

              rm -rf test-image release-image
              cp -R CuisImage test-image
              bash .github/scripts/install-updates.sh test-image
              bash .github/scripts/run-tests.sh test-image

              cp -R CuisImage release-image
              bash .github/scripts/install-updates.sh release-image
             ")
          docker start --attach "$CID"
          rm -rf CuisImage
          mkdir -p CuisImage
          docker cp "$CID:/workspace/release-image/." CuisImage/
          docker rm "$CID"
          echo "Extracted clean release image files:"
          ls -lh CuisImage/

      # Rebuild with the updated CuisImage/ so the runtime stage gets
      # the post-update image baked in.
      - name: Build minimal runtime image
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file docker/Dockerfile \
            --target runtime \
            --load \
            --tag cuis-headless:${{ github.ref_name }}-${{ matrix.arch }} \
            .

      - name: Export runtime image for release
        run: |
          set -euo pipefail

          mkdir -p release-artifacts
          docker save "cuis-headless:${{ github.ref_name }}-${{ matrix.arch }}" | gzip > \
            "release-artifacts/cuis-headless-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz"

          ls -lh release-artifacts/*.tar.gz

      - name: Package release ZIPs for ${{ matrix.arch }}
        run: |
          bash .github/scripts/package-release-zips.sh "${{ matrix.arch }}" CuisImage release-artifacts cuis-mcp

      - name: Upload ${{ matrix.arch }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: |
            release-artifacts/*.zip
            release-artifacts/*.tar.gz
          retention-days: 7

  # ── 2. Publish all assets as a single GitHub Release ─────────────────────
  publish:
    name: Publish GitHub Release
    needs: build-runtime
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download amd64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-amd64
          path: release-artifacts

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-arm64
          path: release-artifacts

      - name: List release files
        run: ls -lh release-artifacts/

      - name: Build release notes
        run: |
          set -euo pipefail

          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -Fxv "$GITHUB_REF_NAME" | head -1 || true)
          if [[ -n "$PREVIOUS_TAG" ]]; then
            COMMIT_RANGE="$PREVIOUS_TAG..$GITHUB_SHA"
          else
            COMMIT_RANGE="$GITHUB_SHA"
          fi

          {
            echo "## Cuis Smalltalk ${{ github.ref_name }}"
            echo
            echo "Ready-to-run packages. Download the ZIP for your platform, unzip, run the start script - no installation required."
            echo
            echo "Headless Docker runtime images are also included as \`*.tar.gz\` assets, one per Linux architecture."
            echo
            echo "| Platform | ZIP | Run |"
            echo "|---|---|---|"
            echo "| macOS | \`*-macos.zip\` | \`RunCuisOnMac.sh\` or double-click \`RunCuisOnFinder.command\` |"
            echo "| Linux x86_64 | \`*-linux-x86_64.zip\` | \`RunCuisOnLinux.sh\` |"
            echo
            echo "> **macOS ZIP download:** run \`./unquarantine.sh\` before launching."
            echo
            echo "### What's inside each ZIP"
            echo "- Clean Smalltalk image with all core updates already applied"
            echo "- BaseImageTests verified before packaging, but not bundled into the release image"
            echo "- VM binary for the target platform"
            echo "- TrueType fonts"
            echo "- Start script"
            echo
            echo "### Docker assets"
            echo "- \`cuis-headless-${{ github.ref_name }}-linux-amd64.tar.gz\`"
            echo "- \`cuis-headless-${{ github.ref_name }}-linux-arm64.tar.gz\`"
            echo "- Load with \`docker load < asset.tar.gz\`"
            echo
            echo "### Git digest"
            if [[ -n "$PREVIOUS_TAG" ]]; then
              echo "Changes since \`$PREVIOUS_TAG\`:"
            else
              echo "Commits included in this release:"
            fi
            git log --no-merges --pretty='- `%h` %s' "$COMMIT_RANGE"
            echo
            echo "### What's NOT included"
            echo "- \`CoreUpdates/\` - already applied to the image"
            echo "- \`Packages/\` - load optional packages from inside Cuis"
            echo "- \`Documentation/\` - see the [repository](https://github.com/${{ github.repository }})"
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cuis Smalltalk ${{ github.ref_name }}"
          body_path: release-notes.md
          files: |
            release-artifacts/*.zip
            release-artifacts/*.tar.gz
          fail_on_unmatched_files: true
