name: Release

on:
  push:
    tags:
      - 'v*'

env:
  # Opt into Node.js 24 for JavaScript actions ahead of the runner default
  # switch (June 2026). Helps catch incompatibilities early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Build runtime image per arch (updates + tests + minimal image) ─────
  build-runtime:
    name: Build runtime (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build workspace image
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file docker/Dockerfile \
            --target workspace \
            --load \
            --tag cuis-workspace:${{ matrix.arch }} \
            .

      # Apply updates + run tests + extract updated image in one container.
      # Updates modify the image in-place; tests must run in the same container.
      # We commit the container after updates so we can extract the image.
      # --privileged: Squeak JIT requires mprotect(PROT_READ|PROT_EXEC).
      - name: Apply updates, run tests, extract updated image
        run: |
          CID=$(docker create \
            --privileged \
            cuis-workspace:${{ matrix.arch }} \
            bash -c "
              set -euo pipefail

              IMAGE_FILE=\$(ls CuisImage/ | grep -E 'Cuis[0-9]+\.[0-9]+-[0-9]+\.image' | head -1)
              [[ -z \"\$IMAGE_FILE\" ]] && { echo 'ERROR: no .image found in CuisImage/' >&2; exit 1; }

              INSTALL_UPDATES_SCRIPT=\"\\
                Utilities classPool at: #AuthorName put: 'GitHubActions'.
                Utilities classPool at: #AuthorInitials put: 'GHA'.
                ChangeSet installNewUpdates.
                Smalltalk saveAndQuit.\\
              \"

              \"\$CUIS_VM\" \$CUIS_VM_ARGS CuisImage/\"\$IMAGE_FILE\" -d \"\$INSTALL_UPDATES_SCRIPT\"

              \"\$CUIS_VM\" \$CUIS_VM_ARGS CuisImage/\"\$IMAGE_FILE\" -s .github/scripts/run-tests.st
            ")
          docker start --attach "$CID"
          docker cp "$CID:/workspace/CuisImage/." CuisImage/
          docker rm "$CID"
          echo "Extracted image files:"
          ls -lh CuisImage/

      # Rebuild with the updated CuisImage/ so the runtime stage gets
      # the post-update image baked in.
      - name: Build minimal runtime image
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file docker/Dockerfile \
            --target runtime \
            --load \
            --tag cuis-runtime:${{ matrix.arch }} \
            .

      - name: Package release ZIPs for ${{ matrix.arch }}
        run: |
          set -euo pipefail

          OUTPUT_DIR="$(realpath "release-artifacts")"
          ARCH_FILTER="${{ matrix.arch }}"
          mkdir -p "$OUTPUT_DIR"

          IMAGE_FILE=$(ls CuisImage/ | grep -E '^Cuis[0-9]+\.[0-9]+-[0-9]+\.image$' | head -1)
          [[ -z "$IMAGE_FILE" ]] && { echo "ERROR: no .image found in CuisImage/" >&2; exit 1; }

          IMAGE_BASE="${IMAGE_FILE%.image}"
          CHANGES_FILE="${IMAGE_BASE}.changes"
          SOURCES_FILE=$(ls CuisImage/ | grep -E '^Cuis[0-9]+\.[0-9]+\.sources$' | head -1)
          [[ -z "$SOURCES_FILE" ]] && { echo "ERROR: no .sources found in CuisImage/" >&2; exit 1; }

          echo "Image   : CuisImage/$IMAGE_FILE"
          echo "Sources : CuisImage/$SOURCES_FILE"
          echo "Arch    : $ARCH_FILTER"
          echo ""

          package_platform() {
              local PLATFORM="$1"; shift
              local VM_DIR="$1";   shift
              local RUN_SCRIPTS=("$@")

              local ZIP_NAME="${IMAGE_BASE}-${PLATFORM}.zip"
              local STAGING ZIP_PATH
              STAGING=$(mktemp -d)
              ZIP_PATH="$OUTPUT_DIR/$ZIP_NAME"
              local DEST="$STAGING/Cuis-${PLATFORM}"
              mkdir -p "$DEST/CuisImage" "$DEST/CuisVM.app/Contents" "$DEST/TrueTypeFonts"

              echo "Packaging $PLATFORM ..."

              cp "CuisImage/$IMAGE_FILE"     "$DEST/CuisImage/"
              cp "CuisImage/$CHANGES_FILE"   "$DEST/CuisImage/" 2>/dev/null || true
              cp "CuisImage/$SOURCES_FILE"   "$DEST/CuisImage/"
              cp "CuisImage/UnicodeData.txt" "$DEST/CuisImage/"

              cp -r "$VM_DIR" "$DEST/CuisVM.app/Contents/"
              cp -r "CuisVM.app/Contents/Resources" "$DEST/CuisVM.app/Contents/"

              cp -r TrueTypeFonts/. "$DEST/TrueTypeFonts/"

              for s in "${RUN_SCRIPTS[@]}"; do
                  [[ -f "$s" ]] && cp "$s" "$DEST/"
              done

              cp LICENSE   "$DEST/"
              cp README.md "$DEST/"

              find "$DEST" \( -name "*.sh" -o -name "*.command" \) -exec chmod +x {} +

              (cd "$STAGING" && zip -qr --symlinks "$ZIP_PATH" "Cuis-${PLATFORM}")
              rm -rf "$STAGING"

              echo "  -> $ZIP_NAME  ($(du -sh "$ZIP_PATH" | cut -f1))"
          }

          case "$ARCH_FILTER" in
            arm64)
              package_platform "linux-arm64" \
                  "CuisVM.app/Contents/Linux-arm64" \
                  "RunCuisOnLinux.sh"
              ;;
            amd64|all)
              package_platform "linux-x86_64" \
                  "CuisVM.app/Contents/Linux-x86_64" \
                  "RunCuisOnLinux.sh"

              package_platform "macos" \
                  "CuisVM.app/Contents/MacOS" \
                  "RunCuisOnMac.sh" "RunCuisOnFinder.command" "unquarantine.sh"

              package_platform "windows-x86_64" \
                  "CuisVM.app/Contents/Windows-x86_64" \
                  "RunCuisOnWindows.bat"

              package_platform "windows-arm64" \
                  "CuisVM.app/Contents/Windows-arm64" \
                  "RunCuisOnWindows.bat"

              if [[ "$ARCH_FILTER" == "all" ]]; then
                package_platform "linux-arm64" \
                    "CuisVM.app/Contents/Linux-arm64" \
                    "RunCuisOnLinux.sh"
              fi
              ;;
            *)
              echo "ERROR: unknown arch filter '$ARCH_FILTER'. Use: amd64, arm64, all" >&2
              exit 1
              ;;
          esac

          echo ""
          echo "Artifacts:"
          ls -lh "$OUTPUT_DIR/"

      - name: Upload ${{ matrix.arch }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: release-artifacts/*.zip
          retention-days: 7

  # ── 2. Publish all ZIPs as a single GitHub Release ───────────────────────
  publish:
    name: Publish GitHub Release
    needs: build-runtime
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download amd64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-amd64
          path: release-artifacts

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-arm64
          path: release-artifacts

      - name: List release files
        run: ls -lh release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cuis Smalltalk ${{ github.ref_name }}"
          body: |
            ## Cuis Smalltalk ${{ github.ref_name }}

            Ready-to-run packages. Download the ZIP for your platform, unzip, run the start script — no installation required.

            | Platform | ZIP | Run |
            |---|---|---|
            | macOS | `*-macos.zip` | `RunCuisOnMac.sh` or double-click `RunCuisOnFinder.command` |
            | Linux x86_64 | `*-linux-x86_64.zip` | `RunCuisOnLinux.sh` |
            | Linux ARM64 | `*-linux-arm64.zip` | `RunCuisOnLinux.sh` |
            | Windows x86_64 | `*-windows-x86_64.zip` | `RunCuisOnWindows.bat` |
            | Windows ARM64 | `*-windows-arm64.zip` | `RunCuisOnWindows.bat` |

            > **macOS ZIP download:** run `./unquarantine.sh` before launching.

            ### What's inside each ZIP
            - Updated Smalltalk image (all core changesets applied, tests verified)
            - VM binary for the target platform
            - TrueType fonts
            - Start script

            ### What's NOT included
            - `CoreUpdates/` — already applied to the image
            - `Packages/` — load optional packages from inside Cuis
            - `Documentation/` — see the [repository](https://github.com/${{ github.repository }})
          files: release-artifacts/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
