name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # --- 1. Run the full test suite before releasing ---
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up VM
        run: .ContinuousIntegrationScripts/installVm.sh

      - name: Apply core updates to image
        run: .ContinuousIntegrationScripts/installUpdates.sh

      - name: Run test suite
        run: .ContinuousIntegrationScripts/runTests.sh

  # --- 2. Build the updated image and package per platform ---
  build:
    name: Build release artifacts
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up VM (Linux)
        run: .ContinuousIntegrationScripts/installVm.sh

      - name: Apply core updates to image
        run: .ContinuousIntegrationScripts/installUpdates.sh

      - name: Package release ZIPs (all platforms)
        run: |
          chmod +x .ContinuousIntegrationScripts/buildRelease.sh
          .ContinuousIntegrationScripts/buildRelease.sh release-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-zips
          path: release-artifacts/*.zip
          retention-days: 7

  # --- 3. Publish the GitHub Release ---
  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-zips
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cuis Smalltalk ${{ github.ref_name }}"
          body: |
            ## Cuis Smalltalk ${{ github.ref_name }}

            Ready-to-run packages. Download the ZIP for your platform, unzip, and run the start script — no installation required.

            | Platform | File |
            |---|---|
            | macOS | `*-macos.zip` → `RunCuisOnMac.sh` or double-click `RunCuisOnFinder.command` |
            | Linux x86_64 | `*-linux-x86_64.zip` → `RunCuisOnLinux.sh` |
            | Linux ARM64 | `*-linux-arm64.zip` → `RunCuisOnLinux.sh` |
            | Windows x86_64 | `*-windows-x86_64.zip` → `RunCuisOnWindows.bat` |
            | Windows ARM64 | `*-windows-arm64.zip` → `RunCuisOnWindows.bat` |

            > **macOS note:** if downloaded as a ZIP, run `./unquarantine.sh` from the terminal before launching.

            ### What's included
            - Updated image with all core changesets applied
            - VM for the target platform
            - TrueType fonts
            - Start scripts

            ### What's not included
            - `CoreUpdates/` — changesets are already applied to the image
            - `Packages/` — optional packages, load from the image as needed
            - `Documentation/` — see [the repository](https://github.com/${{ github.repository }})
          files: release-artifacts/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
